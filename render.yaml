services:
  - type: web
    name: cloud-inventory-bdr-ai-coach
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: DATA_DIR
        value: /var/data
      - key: OPENAI_API_KEY
        sync: false
